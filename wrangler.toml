name = "swimsync-api"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── R2 bucket binding ──────────────────────────────────────────────────────────
# The Worker can read/write R2 directly via env.R2_BUCKET (used in complete-upload
# to verify the object exists). Presigned URLs are generated with the S3-compat API.
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "swimsync-videos"
# preview_bucket_name = "swimsync-videos-dev"   # uncomment for `wrangler dev`

# ── Secrets (set via `wrangler secret put`) ────────────────────────────────────
# Do NOT put real values here — these are placeholders to document what is needed.
#
# Required secrets:
#   SUPABASE_URL              — https://<project>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY — service_role JWT from Supabase dashboard
#   R2_ACCESS_KEY_ID          — R2 API token access key
#   R2_SECRET_ACCESS_KEY      — R2 API token secret key
#   R2_ACCOUNT_ID             — Cloudflare account ID (no dashes)
#   R2_BUCKET_NAME            — swimsync-videos  (must match bucket_name above)

# ── Non-secret vars (safe to commit) ─────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ── Routes ────────────────────────────────────────────────────────────────────
# Uncomment and fill in once you have a custom domain / zone:
# [[routes]]
# pattern = "api.swimsync.example.com/*"
# zone_name = "swimsync.example.com"

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true
